name: PowerHausBox Cloudflare Tunnel
version: "0.6.0"
slug: powerhausbox_cloudflare_tunnel
description: Cloudflare Tunnel add-on with Studio pairing, SSH access, web terminal, cloud backups, and HA auth sync.
url: https://github.com/gregor-autischer/PowerHausBox-Core
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_stream: true
watchdog: http://[HOST]:8099/_powerhausbox/api/healthz
panel_icon: mdi:cloud-lock-outline
panel_title: PowerHaus Box
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true
host_network: true
ports:
  22/tcp: 22
ports_description:
  22/tcp: SSH server
map:
  - config:rw
  - backup:rw
  - media:rw
  - share:rw
  - ssl:ro
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
  armhf: ghcr.io/home-assistant/armhf-base:latest
  armv7: ghcr.io/home-assistant/armv7-base:latest
  i386: ghcr.io/home-assistant/i386-base:latest
options:
  ui_auth_enabled: false
  ui_password: change-this-password
  studio_base_url: https://studio.powerhaus.ai
  auto_enable_iframe_embedding: true
  ssh:
    username: "hassio"
    authorized_keys: []
    sftp: false
    allow_tcp_forwarding: false
schema:
  ui_auth_enabled: bool
  ui_password: password
  studio_base_url: str
  auto_enable_iframe_embedding: bool
  ssh:
    username: str
    authorized_keys:
      - str
    sftp: bool
    allow_tcp_forwarding: bool
