<!doctype html>
<html lang="en" data-theme="corporate">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PowerHausBox Cloudflare Tunnel</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
    <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-300">
      <div class="card-body gap-4">
        <div>
          <p class="text-sm text-base-content/70">PowerHausBox Add-on</p>
          <h1 class="card-title text-2xl">Cloudflare Tunnel Login</h1>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert {% if category == 'error' %}alert-error{% elif category == 'success' %}alert-success{% elif category == 'warning' %}alert-warning{% else %}alert-info{% endif %}">
                <span>{{ message }}</span>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="/login" class="space-y-4">
          <fieldset class="fieldset">
            <label class="label" for="password">Add-on password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="input input-bordered w-full"
              placeholder="Enter password"
              required
            />
            <p class="label text-xs">Set this password in add-on configuration as <code>ui_password</code>.</p>
          </fieldset>

          <button type="submit" class="btn btn-primary w-full">Sign in</button>
        </form>
      </div>
    </div>
  </body>
</html>
