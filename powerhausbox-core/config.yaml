name: PowerHausBox Core
version: "0.9.0"
slug: powerhausbox_core
description: PowerHaus Studio core add-on for pairing, remote access, cloud backups, diagnostics, and Home Assistant auth sync.
url: https://github.com/gregor-autischer/PowerHausBox-Core
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_stream: true
watchdog: http://[HOST]:8099/_powerhausbox/api/livez
panel_icon: mdi:cloud-lock-outline
panel_title: PowerHaus Box
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true
host_network: true
host_pid: true
host_uts: true
host_dbus: true
docker_api: true
full_access: true
apparmor: false
map:
  - config:rw
  - addons:rw
  - backup:rw
  - media:rw
  - share:rw
  - ssl:ro
arch:
  - aarch64
  - amd64
  - armv7
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.21
  amd64: ghcr.io/home-assistant/amd64-base:3.21
  armv7: ghcr.io/home-assistant/armv7-base:3.21
options:
  ui_auth_enabled: false
  ui_password: change-this-password
  studio_base_url: https://studio.powerhaus.ai
  auto_enable_iframe_embedding: true
  debug_manual_apply_mode: false
schema:
  ui_auth_enabled: bool
  ui_password: password
  studio_base_url: str
  auto_enable_iframe_embedding: bool
  debug_manual_apply_mode: bool
